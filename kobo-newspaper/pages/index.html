<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Morgontidningen</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111111;
      font-family: Georgia, "Times New Roman", Times, serif;
      line-height: 1.7;
      font-size: 18px;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 2.2rem 1.5rem 3.5rem;
    }

    h1, h2, h3 {
      margin: 0;
      line-height: 1.25;
      font-weight: 700;
      color: #111111;
    }

    p {
      margin: 0 0 0.85rem;
    }

    a {
      color: #111111;
      text-decoration: underline;
    }

    .title-page {
      margin-bottom: 2.2rem;
      padding-bottom: 1.1rem;
      border-bottom: 1px solid #d5d5d5;
    }

    .paper-title {
      font-size: 2.35rem;
      margin-bottom: 0.45rem;
      letter-spacing: 0.02em;
    }

    .date-line {
      font-size: 1.04rem;
      color: #2b2b2b;
      margin: 0;
    }

    .intro-block {
      margin-top: 1.4rem;
      margin-bottom: 1.4rem;
      padding-bottom: 1.1rem;
      border-bottom: 1px solid #dedede;
    }

    .intro-title {
      font-size: 1.5rem;
      margin-bottom: 0.55rem;
    }

    .overview-list {
      margin: 0;
      padding-left: 1.2rem;
    }

    .overview-list li {
      margin: 0 0 0.45rem;
    }

    .facts-list {
      margin: 0;
      padding-left: 1.2rem;
      color: #222222;
      font-size: 0.98rem;
    }

    .facts-list li {
      margin: 0 0 0.35rem;
    }

    .news-section {
      margin-top: 2rem;
      margin-bottom: 2.2rem;
    }

    .section-title {
      font-size: 1.85rem;
      margin-bottom: 1rem;
      border-top: 1px solid #c9c9c9;
      padding-top: 0.8rem;
      letter-spacing: 0.02em;
    }

    .story {
      margin-bottom: 2.2rem;
      padding-bottom: 1.3rem;
      border-bottom: 1px solid #e8e8e8;
    }

    .story-title {
      font-size: 1.35rem;
      margin-bottom: 0.55rem;
    }

    .ingress {
      font-style: italic;
      color: #202020;
      margin-bottom: 0.75rem;
    }

    .summary-paragraph {
      margin-bottom: 0.7rem;
    }

    .importance {
      margin-top: 0.75rem;
      margin-bottom: 0.8rem;
    }

    .eli5-box {
      border: 1px solid #cfcfcf;
      padding: 0.7rem 0.8rem;
      background: #f7f7f7;
      margin-bottom: 0.8rem;
    }

    .source {
      margin-top: 0.25rem;
      font-size: 0.97rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="title-page">
      <h1 class="paper-title">Morgontidningen</h1>
      <p class="date-line">Datum: 2026-03-04</p>
    </header>

    <section class="intro-block">
      <h2 class="intro-title">Det viktigaste idag</h2>
      
      <p>Ingen sammanfattning tillgänglig ännu.</p>
      
    </section>

    <section class="intro-block">
      <h2 class="intro-title">Dagens fakta</h2>
      <ul class="facts-list">
        <li>Totalt antal sektioner: 2</li>
        <li>Totalt antal artiklar: 0</li>
        <li>Senast uppdaterad: 2026-03-04</li>
        <li>Format: Optimerat för e-bläckläsning</li>
      </ul>
    </section>

    
    <section class="news-section">
      <h2 class="section-title">Morgontidningen</h2>

      
    </section>
    
    <section class="news-section">
      <h2 class="section-title">Tech & AI-morgonbrief</h2>

      
    </section>
    
  </main>
</body>
</html>
