name: daily_news

concurrency:
  group: daily-news
  cancel-in-progress: false

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: kobo-newspaper

    env:
      INSTAPAPER_USERNAME: ${{ secrets.INSTAPAPER_USERNAME }}
      INSTAPAPER_PASSWORD: ${{ secrets.INSTAPAPER_PASSWORD }}
      ARTICLE_URL: ${{ secrets.ARTICLE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "kobo-newspaper/requirements.txt"

      - name: Prepare daily metadata
        run: |
          set -euo pipefail
          DAILY_DATE="$(date -u +%F)"
          echo "DAILY_DATE=$DAILY_DATE" >> "$GITHUB_ENV"

      - name: 3. Install requirements
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install --requirement requirements.txt

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "OPENAI_API_KEY is missing."
            exit 1
          fi
          if [[ -z "${INSTAPAPER_USERNAME:-}" || -z "${INSTAPAPER_PASSWORD:-}" ]]; then
            echo "Instapaper credentials are missing."
            exit 1
          fi

      - name: 4. Run staged newspaper pipeline
        env:
          INSTAPAPER_USERNAME: ${{ secrets.INSTAPAPER_USERNAME }}
          INSTAPAPER_PASSWORD: ${{ secrets.INSTAPAPER_PASSWORD }}
          ARTICLE_URL: ${{ secrets.ARTICLE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          PYTHONPATH=$PWD python app/pipeline.py

      - name: Verify generated pages artifacts
        run: |
          set -euo pipefail
          test -f "pages/index.html"
          test -f "pages/${DAILY_DATE}.html"

      - name: 5. Set daily Instapaper URL
        run: |
          set -euo pipefail

          BASE_URL="${ARTICLE_URL:-https://luckepucke6.github.io/kobo-pages-test/kobo-newspaper/pages}"

          BASE_URL="${BASE_URL%/}"
          if [[ "$BASE_URL" == *.html ]]; then
            BASE_URL="${BASE_URL%/*}"
          fi

          DAILY_URL="${BASE_URL}/${DAILY_DATE}.html?t=$(date +%s)"
          echo "ARTICLE_URL=${DAILY_URL}" >> "$GITHUB_ENV"
          echo "Daily ARTICLE_URL set to: ${DAILY_URL}"

      - name: 6. Commit and push updates
        run: |
          set -euo pipefail
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add pages/index.html "pages/${DAILY_DATE}.html"
          git commit -m "chore: update daily newspaper" || echo "No changes"
          git push origin HEAD:main

      - name: Wait for GitHub Pages to update
        run: |
          set -euo pipefail
          sleep 30

      - name: 7. Send to Instapaper
        run: |
          set -euo pipefail
          python scripts/send_to_instapaper.py
